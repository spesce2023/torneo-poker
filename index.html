<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo de Poker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a2e1f;
    display: flex;
    justify-content: center;
  }
  .screen {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: #14532d;
    padding: 40px 20px 32px;
    text-align: center;
  }
  .state-block { margin-bottom: 32px; }
  .pre-label { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .pre-countdown { color: #fff; font-size: 28px; font-weight: 700; }
  .live-label { color: #fff; font-size: 22px; font-weight: 700; }
  .live-sub { color: #a9d9bc; font-size: 13px; margin-top: 6px; }

  .menu-list { display: flex; flex-direction: column; gap: 14px; }
  .menu-item {
    display: block;
    background: #2f8a5b;
    border-radius: 8px;
    padding: 16px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
  }

  .admin-link {
    display: block;
    text-align: center;
    color: #7fb99c;
    font-size: 12px;
    margin-top: 28px;
    text-decoration: none;
  }

  [data-state="pre"] .state-live { display: none; }
  [data-state="live"] .state-pre { display: none; }
</style>
</head>
<body>

<div class="screen" data-state="pre" id="screen">

  <div class="state-block">
    <div class="state-pre">
      <div class="pre-label">Comienzo en</div>
      <div class="pre-countdown" id="countdown">Cargando...</div>
    </div>
    <div class="state-live">
      <div class="live-label">Torneo en curso</div>
      <div class="live-sub">Consultá "Premios" para ver el nivel de blinds actual</div>
    </div>
  </div>

  <div class="menu-list">
    <a class="menu-item" href="fichas.html">Fichas (valores)</a>
    <a class="menu-item" href="estructura_torneo.pdf" target="_blank">Estructura de torneo</a>
    <a class="menu-item" href="premios.html">Premios</a>
    <a class="menu-item" href="precios.html">Precios (bebida/comida)</a>
  </div>

  <a class="admin-link" href="admin.html">Admin</a>

</div>

<script>
  const screenElement = document.getElementById('screen');
  const countdownElement = document.getElementById('countdown');
  const startTime = new Date('2026-07-17T21:30:00');

  function updateCountdown() {
    const now = new Date();
    const distance = startTime - now;

    if (distance <= 0) {
      screenElement.dataset.state = 'live';
      return;
    }

    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    countdownElement.textContent =
      `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
